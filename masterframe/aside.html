<div id="menu-grid">
    <div id="aside-header">Personnel Login</div>
    <div id="outer-login-prompt">
        <div id="inner-menu-header">
            <img class="tricell" src="/images/Tricell_logo.png" alt="Tricell">
            <div>Access restricted to authorized personnel only</div>
        </div>

        <form>
            <div id="inner-menu-form">
                <div>
                    <div class="form-text">Username</div>
                    <input class="login" type="text" value="Enter username">
                </div>
                <div>
                    <div class="form-text">Password</div>
                    <input class="login" type="text" value="Enter password">
                </div>
            </div>

            <div id="inner-menu-buttons">
                <input type="checkbox" name="remember">
                <label for="remember">Remember me</label>

                <div>
                    <input id="signin" type="submit" value="Sign In">
                </div>
                <div id="forgorpassword">
                    <a class="forgot" href="#">Forgot password?</a>
                </div>
            </div>
        </form>
    </div>
</div>
<div class="grid-emptywhite"></div>
